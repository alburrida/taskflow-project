<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Tareas - Nota Central</title>
<link rel="stylesheet" href="style.css">

<!--

      )_/ /|\   /|\ \_(
-->
</head>

<body>

<div class="contenedor-de-notas">

  <header>
    <h1>Lista de Tareas</h1>
  </header>

  <aside>
    <div class="category-box">
      <h2>Categorías</h2>
      <ul>
        <li data-filter="all" class="filtro-all active">Todas</li>
        <li data-filter="trabajo" class="filtro-trabajo">Trabajo</li>
        <li data-filter="hogar" class="filtro-hogar">Hogar</li>
        <li data-filter="personal" class="filtro-personal">Personal</li>
      </ul>
    </div>
  </aside>

  <main>
    <!-- FORMULARIO AÑADIR TAREA -->
    <form id="task-form">
      <input type="text" id="task-input" placeholder="Añadir nueva tarea..." required>
      
      <select id="task-category">
        <option value="trabajo">Trabajo</option>
        <option value="hogar">Hogar</option>
        <option value="personal">Personal</option>
      </select>

      <select id="task-priority">
        <option value="high">Alta</option>
        <option value="medium">Media</option>
        <option value="low">Baja</option>
      </select>

      <button type="submit">Añadir</button>
    </form>

    <!-- BUSCADOR -->
    <input type="text" id="search-input" placeholder="Buscar tarea...">

    <!-- LISTA DE TAREAS -->
    <section class="task-list" id="task-list">
    </section>
  </main>

</div>

<!-- FILTROS -->
<script src="app.js"></script>
<script>
/* FILTROS POR CATEGORÍA */
const filtros = document.querySelectorAll("aside li");

function aplicarFiltro(categoria) {
  document.querySelectorAll(".task").forEach(tarea => {
    if (categoria === "all" || tarea.dataset.category === categoria) {
      tarea.style.display = "flex";
    } else {
      tarea.style.display = "none";
    }
  });
}

filtros.forEach(filtro => {
  filtro.addEventListener("click", () => {
    const categoria = filtro.dataset.filter;

    // Toggle si ya estaba activo
    if (filtro.classList.contains("active")) {
      filtro.classList.remove("active");
      aplicarFiltro("all");
      return;
    }

    filtros.forEach(btn => btn.classList.remove("active"));
    filtro.classList.add("active");
    aplicarFiltro(categoria);
  });
});
</script>

</body>
</html>
