<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Tareas - Nota Central</title>
<link rel="stylesheet" href="style.css">

<!--
            _   _
           (.)_(.)
        _ (   _   ) _
       / \/`-----'\/ \
     __\ ( (     ) ) /__
     )   /\ \._./ /\   (
      )_/ /|\   /|\ \_(
-->

</head>
<body>

<div class="contenedor-de-notas">

  <header>
    <h1>Lista de Tareas</h1>
  </header>

  <aside>
  <div class="category-box">
    <h2>Categorías</h2>
    <ul>
      <li data-filter="all" class="filtro-all">Todas</li>
      <li data-filter="trabajo" class="filtro-trabajo">Trabajo</li>
      <li data-filter="hogar" class="filtro-hogar">Hogar</li>
      <li data-filter="personal" class="filtro-personal">Personal</li>
    </ul>
  </div>
</aside>

  <main>
    <section class="task-list">

      <div class="task high" data-category="hogar">
        <input type="checkbox" id="tarea1">
        <label for="tarea1" class="task-content">
            <span class="title">Cocinar</span>
            <span class="category">Hogar</span>
            <span class="priority">Alta</span>
        </label>
      </div>

      <div class="task medium" data-category="trabajo">
        <input type="checkbox" id="tarea2">
        <label for="tarea2" class="task-content">
          <span class="title">Proyecto</span>
          <span class="category">Trabajo</span>
          <span class="priority">Media</span>
        </label>
      </div>

      <div class="task low" data-category="personal">
        <input type="checkbox" id="tarea3">
        <label for="tarea3" class="task-content">
          <span class="title">Ir al gimnasio</span>
          <span class="category">Personal</span>
          <span class="priority">Baja</span>
        </label>
      </div>

      <div class="task high" data-category="trabajo">
        <input type="checkbox" id="tarea4">
        <label for="tarea4" class="task-content">
          <span class="title">Preparar presentación</span>
          <span class="category">Trabajo</span>
          <span class="priority">Alta</span>
        </label>
      </div>

      <div class="task medium" data-category="hogar">
        <input type="checkbox" id="tarea5">
        <label for="tarea5" class="task-content">
          <span class="title">Hacer la compra semanal</span>
          <span class="category">Hogar</span>
          <span class="priority">Media</span>
        </label>
      </div>

    </section>
  </main>

</div>

<script>
const filtros = document.querySelectorAll("aside li");
const tareas = document.querySelectorAll(".task");

filtros.forEach(filtro => {
  filtro.addEventListener("click", () => {
    const categoria = filtro.dataset.filter;

    // Si el botón ya estaba activo, lo desactivamos
    if (filtro.classList.contains("active")) {
      filtro.classList.remove("active");
      // Mostrar todas las tareas
      tareas.forEach(tarea => tarea.style.display = "flex");
      return; // salimos del click
    }

    // Si no estaba activo, desactivar todos
    filtros.forEach(btn => btn.classList.remove("active"));
    // Activar el botón clicado
    filtro.classList.add("active");

    // Filtrar tareas
    tareas.forEach(tarea => {
      if (categoria === "all" || tarea.dataset.category === categoria) {
        tarea.style.display = "flex";
      } else {
        tarea.style.display = "none";
      }
    });
  });
});
</script>

</body>
</html>
