<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Lista de Tareas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <script>
  const savedTheme = localStorage.getItem("theme");

  if (savedTheme === "dark") {
    document.documentElement.classList.add("dark");
  }
  </script>


<!--

      )_/ /|\   /|\ \_(
-->
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300 flex justify-center items-center min-h-screen select-none">

  <div class="w-full max-w-3xl bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 transition-colors duration-300">

    <!-- HEADER -->
    <header class="relative flex justify-center items-center mb-6">
      <h1 class="text-3xl font-bold tracking-tight text-gray-800 dark:text-gray-100">Lista de Tareas</h1>
      <button
      id="theme-toggle"
      class="absolute right-0 px-3 py-1 rounded-lg bg-gray-200 dark:bg-gray-700 text-sm hover:scale-105 transition shadow-lg"
      style="box-shadow: 0 4px 14px 0 rgba(0,0,0,0.25), 0 1.5px 0px 0 #b2b2b2;"
      >
      🌙
      </button>
    </header>


    <!-- CONTADORES Y ACCIONES GLOBALES -->
    <div class="flex flex-wrap gap-4 mb-4 items-center justify-center">
      <div id="counter-pending" class="bg-red-200 dark:bg-red-600 text-red-800 dark:text-white px-3 py-1 rounded-xl">Pendientes: 0</div>
      <div id="counter-completed" class="bg-green-200 dark:bg-green-600 text-green-800 dark:text-white px-3 py-1 rounded-xl">Completadas: 0</div>
      <div id="counter-total" class="bg-blue-200 dark:bg-blue-600 text-blue-800 dark:text-white px-3 py-1 rounded-xl">Total: 0</div>

      <button
        id="complete-all-btn"
        class="px-3 py-1 rounded-xl text-sm bg-green-300 hover:bg-green-400 dark:bg-green-700 dark:hover:bg-green-600 text-green-900 dark:text-white shadow-md hover:shadow-xl active:translate-y-1 active:shadow-inner transition-transform duration-150 hover:scale-105"
        type="button"
      >
        Marcar todas como completadas
      </button>
    </div>

    <!-- CATEGORÍAS -->
    <div class="flex gap-2 mb-6 flex-wrap">

      <button data-filter="all"
        class="category-btn px-3 py-1 rounded-xl text-sm bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 dark:text-white shadow-md hover:shadow-xl dark:hover:shadow-xl active:translate-y-1 active:shadow-inner transition-all duration-150 ease-in-out selected:bg-gray-300 dark:selected:bg-gray-600">
        Todas
      </button>

      <button data-filter="trabajo"
        class="category-btn px-3 py-1 rounded-xl text-sm bg-purple-400 hover:bg-purple-500 dark:bg-purple-600 dark:hover:bg-purple-500 dark:text-white shadow-md hover:shadow-xl dark:hover:shadow-xl active:translate-y-1 active:shadow-inner transition-all duration-150 ease-in-out selected:bg-purple-500 dark:selected:bg-purple-500">
        Trabajo
      </button>

      <button data-filter="hogar"
        class="category-btn px-3 py-1 rounded-xl text-sm bg-pink-300 hover:bg-pink-400 dark:bg-pink-600 dark:hover:bg-pink-500 dark:text-white shadow-md hover:shadow-xl dark:hover:shadow-xl active:translate-y-1 active:shadow-inner transition-all duration-150 ease-in-out selected:bg-pink-400 dark:selected:bg-pink-500">
        Hogar
      </button>

      <button data-filter="personal"
        class="category-btn px-3 py-1 rounded-xl text-sm bg-indigo-300 hover:bg-indigo-400 dark:bg-indigo-600 dark:hover:bg-indigo-500 dark:text-white shadow-md hover:shadow-xl dark:hover:shadow-xl active:translate-y-1 active:shadow-inner transition-all duration-150 ease-in-out selected:bg-indigo-400 dark:selected:bg-indigo-500">
        Personal
      </button>

  </div>

    <!-- FORMULARIO DE NUEVA TAREA -->
    <form id="task-form" class="flex gap-2 mb-4 flex-wrap">

      <!-- Campo de texto: Nombre de la tarea -->
      <input
        id="task-input"
        type="text"
        placeholder="Añadir nueva tarea..."
        maxlength="15"
        class="flex-1 px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-300 outline-none"
        required
      />

      <!-- Selector de Categoría -->
      <select
        id="task-category"
        class="px-3 py-2 rounded-xl border border-gray-300"
      >
        <option value="trabajo">Trabajo</option>
        <option value="hogar">Hogar</option>
        <option value="personal">Personal</option>
      </select>

      <!-- Selector de Prioridad -->
      <select
        id="task-priority"
        class="px-3 py-2 rounded-xl border border-gray-300"
      >
        <option value="high">Alta</option>
        <option value="medium">Media</option>
        <option value="low">Baja</option>
      </select>

      <!-- Botón de envío -->
      <button
        type="submit"
        class="bg-indigo-200 dark:bg-indigo-700 text-gray-800 dark:text-gray-100 px-4 py-2 rounded-xl shadow hover:shadow-lg transition-transform duration-200 hover:scale-105 hover:bg-indigo-300 dark:hover:scale-105 dark:hover:bg-indigo-800"
      >
        Añadir
      </button>

      <!-- Mensaje de error con transición -->
<p id="form-error" class="text-red-500 text-sm mt-1 transition-opacity duration-200 opacity-0 hidden"></p>

    </form>

    <!-- BUSCADOR -->
    <input id="search-input" type="text" placeholder="Buscar tarea..."
      class="w-full mb-6 px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-green-300 outline-none">

    <!-- LISTA DE TAREAS -->
    <section id="task-list" class="flex flex-col gap-3">
      <!-- Las tareas se añadirán dinámicamente con JS -->
    </section>

  </div>

  <!-- JS -->
  <script src="app.js"></script>
  <script>
    // Toggle dark mode
    const themeToggle = document.getElementById("theme-toggle");
    themeToggle.addEventListener("click", () => {
      document.documentElement.classList.toggle("dark");
    });
  </script>

</body>
</html>
